<!-- =========================================================
     STACKLY — shared <head> block
     For root-level pages, ASSET_PATH = "" (e.g. href="assets/css/style.css")
     For pages one level deep (dashboard/, admin/), ASSET_PATH = "../"
     Replace {{TITLE}} and {{DESC}} per page.
     ========================================================= -->
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>{{TITLE}} · Stackly — Print &amp; Copy Shop Template</title>
<meta name="description" content="{{DESC}}" />
<meta name="theme-color" content="#567660" />
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23567660'/%3E%3Ctext x='50' y='68' font-size='58' font-family='Arial' font-weight='bold' fill='white' text-anchor='middle'%3ES%3C/text%3E%3C/svg%3E" />

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Plus+Jakarta+Sans:wght@500;600;700;800&family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet" />

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

<!-- AOS (scroll animations) -->
<link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css" />

<!-- Tailwind (Play CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<script>
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        fontFamily: {
          sans: ["Inter", "Cairo", "sans-serif"],
          display: ["Plus Jakarta Sans", "Cairo", "sans-serif"],
        },
        colors: {
          primary: {
            50: "#eef2ff", 100: "#e0e7ff", 200: "#c7d2fe", 300: "#a5b4fc",
            400: "#818cf8", 500: "#6366f1", 600: "#567660", 700: "#4338ca",
            800: "#3730a3", 900: "#312e81", 950: "#1e1b4b"
          },
          accent: {
            50: "#fff7ed", 100: "#ffedd5", 200: "#fed7aa", 300: "#fdba74",
            400: "#fb923c", 500: "#f97316", 600: "#ea580c", 700: "#c2410c",
            800: "#9a3412", 900: "#7c2d12"
          }
        },
        boxShadow: {
          soft: "0 10px 40px -12px rgba(79, 70, 229, 0.25)",
          card: "0 4px 24px -6px rgba(15, 23, 42, 0.08)"
        },
        borderRadius: { "4xl": "2rem" }
      }
    }
  };
</script>

<!-- Prevent dark-mode / RTL flash -->
<script>
  (function () {
    var theme = localStorage.getItem("stackly-theme");
    if (theme === "dark") document.documentElement.classList.add("dark");
    var dir = localStorage.getItem("stackly-dir");
    if (dir === "rtl") { document.documentElement.setAttribute("dir", "rtl"); document.documentElement.setAttribute("lang", "ar"); }
  })();
</script>

<link rel="stylesheet" href="{{ASSET_PATH}}assets/css/style.css" />
